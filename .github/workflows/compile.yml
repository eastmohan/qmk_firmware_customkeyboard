name: Manual Vial QMK Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Keyboard Custom Files
        uses: actions/checkout@v4
        with:
          path: custom_source

      - name: Checkout Official Vial-QMK Repository
        uses: actions/checkout@v4
        with:
          repository: vial-kb/vial-qmk
          ref: vial
          submodules: recursive
          path: qmk_firmware

      - name: Setup QMK Environment
        run: |
          python3 -m pip install --user -r qmk_firmware/requirements.txt
          # Inject your keyboard files into the official Vial environment
          cp -r custom_source/keyboards/customkeyboard qmk_firmware/keyboards/

      - name: Compile Custom Firmware
        run: |
          # Add local pip binaries to the path so the system sees the qmk command
          export PATH="$HOME/.local/bin:$PATH"
          cd qmk_firmware
          qmk setup -y
          make customkeyboard:vial

      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: compiled-firmware
          path: |
            qmk_firmware/*.uf2
            qmk_firmware/.build/*.uf2
