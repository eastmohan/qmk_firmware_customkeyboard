name: Manual QMK Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git Safe Directory
        run: |
          git config --global --add safe.directory /__w/qmk_firmware_customkeyboard/qmk_firmware_customkeyboard

      - name: Compile Custom Firmware
        run: |
          make customkeyboard:vial

      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: compiled-firmware
          path: |
            *.uf2
            .build/*.uf2
