name: Manual QMK Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile Custom Firmware
        run: |
          qmk target-generate -kb customkeyboard -km vial || true
          make -f builddefs/build_keyboard.mk KEYBOARD=customkeyboard KEYMAP=vial

      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: compiled-firmware
          path: |
            *.uf2
            .build/*.uf2
